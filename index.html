<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Weather Planner</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div id="header">
        <div id="controls">
            <div style="position:relative;">
                <input type="text" id="start" placeholder="Start location" autocomplete="off">
                <div id="start-suggestions" class="autocomplete-suggestions"></div>
            </div>
            <button id="swapBtn" type="button" onclick="swapLocations()" title="Swap start and destination" aria-label="Swap start and destination">↔</button>
            <div style="position:relative;">
                <input type="text" id="destination" placeholder="Destination" autocomplete="off">
                <div id="destination-suggestions" class="autocomplete-suggestions"></div>
            </div>
            <select id="departureDate" aria-label="Departure date"></select>
            <select id="departureTime" aria-label="Departure time"></select>
            <button id="getRouteBtn" onclick="getRoute()">Get Route & Weather</button>
            <div id="info" style="display:none;">
                <span id="distance"></span>
                <span id="duration"></span>
                <span id="eta"></span>
            </div>
        </div>
    </div>

    <div id="map"></div>
    <div id="alerts"></div>
    <div id="loading">Calculating route and weather...</div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
